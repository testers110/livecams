<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Live Cams | Featured Broadcasters</title>
    <meta name="description" content="Watch live streams from top broadcasters. Real‑time, HD, and interactive – updated continuously.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://your-github-username.github.io/your-repo-name/">
    <meta property="og:title" content="Live Cams | Featured Broadcasters">
    <meta property="og:description" content="Watch live streams from top broadcasters. Real‑time, HD, and interactive.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://via.placeholder.com/1200x630?text=Live+Cams">
    <meta name="twitter:card" content="summary_large_image">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f8f9fc;
            color: #1e2a3a;
            line-height: 1.5;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 1800px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .subhead {
            text-align: center;
            color: #4a627a;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        .cam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 1.8rem;
            justify-items: center;
            align-items: start;
        }
        .cam-card {
            background: #ffffff;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            max-width: 600px;
        }
        .cam-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 30px rgba(0,0,0,0.12);
        }
        .cam-iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            display: block;
            background: #000;
        }
        .cam-info {
            padding: 0.8rem 1rem 1rem;
            background: #fff;
        }
        .username {
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-block;
            margin-bottom: 0.25rem;
        }
        .viewers {
            font-size: 0.85rem;
            color: #2c7a4d;
            font-weight: 500;
            margin-left: 0.5rem;
        }
        .room-subject {
            font-size: 0.85rem;
            color: #5e6f8d;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .loading, .error {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #4a627a;
        }
        .error {
            color: #b91c1c;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #6c7a91;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
        }
        @media (max-width: 860px) {
            .cam-grid {
                grid-template-columns: 1fr;
            }
            body {
                padding: 1rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔥 Live Broadcasters</h1>
    <div class="subhead">Watch HD streams – updated in real time</div>

    <div id="camGrid" class="cam-grid">
        <div class="loading">Loading live rooms…</div>
    </div>

    <footer>
        <p>© 2025 Live Cams • <a href="#" rel="nofollow">Terms</a> | <a href="#" rel="nofollow">Privacy</a></p>
        <p>18+ only. All models are independent broadcasters.</p>
    </footer>
</div>

<script>
    // ========= CONFIGURATION =========
    const WM_SLUG = 'T2CSW';   // Your campaign slug
    const API_URL = `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${WM_SLUG}&client_ip=request_ip&format=json&limit=6&gender=f&hd=true`;

    // ========= DOM elements =========
    const gridContainer = document.getElementById('camGrid');

    async function fetchRooms() {
        try {
            const response = await fetch(API_URL);
            if (!response.ok) {
                throw new Error(`HTTP error ${response.status}`);
            }
            const data = await response.json();
            return data.results || [];
        } catch (err) {
            console.error('API fetch failed:', err);
            throw err;
        }
    }

    function renderRooms(rooms) {
        if (!rooms.length) {
            gridContainer.innerHTML = '<div class="error">No live rooms available at the moment. Please refresh later.</div>';
            return;
        }

        let gridHTML = '';
        for (const room of rooms) {
            let iframeHtml = room.iframe_embed || '';
            if (!iframeHtml && room.chat_room_url) {
                iframeHtml = `<iframe src="${room.chat_room_url}&embed=1&disable_sound=1" width="100%" height="100%" frameborder="0" scrolling="no" allow="autoplay; fullscreen"></iframe>`;
            }

            const viewers = room.num_users ? `${room.num_users.toLocaleString()} viewers` : '';
            const subject = room.room_subject || 'Live now';

            gridHTML += `
                <div class="cam-card">
                    <div class="cam-iframe">
                        ${iframeHtml}
                    </div>
                    <div class="cam-info">
                        <span class="username">${escapeHtml(room.username)}</span>
                        ${viewers ? `<span class="viewers">👁️ ${viewers}</span>` : ''}
                        <div class="room-subject" title="${escapeHtml(subject)}">${escapeHtml(subject)}</div>
                    </div>
                </div>
            `;
        }
        gridContainer.innerHTML = gridHTML;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showError(message) {
        gridContainer.innerHTML = `<div class="error">⚠️ ${escapeHtml(message)}</div>`;
    }

    async function init() {
        try {
            const rooms = await fetchRooms();
            renderRooms(rooms);
        } catch (err) {
            showError('Unable to load live rooms. Please try again later.');
        }
    }

    init();
</script>
</body>
</html>
